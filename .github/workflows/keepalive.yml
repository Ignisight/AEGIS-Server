name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:        # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://attendance-server-ddgs.onrender.com/health)
          echo "Health check status: $response"
          if [ "$response" != "200" ]; then
            echo "::warning::Server returned $response instead of 200"
          fi
