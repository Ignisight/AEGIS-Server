services:
  # 1. Main Application Gateway (Node.js)
  - type: web
    name: aegis-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: work.anuragkishan@gmail.com
      - key: EMAIL_FROM_NAME
        value: A.E.G.I.S Attendance
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FACE_SERVICE_URL
        sync: false
