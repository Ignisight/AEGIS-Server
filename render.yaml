services:
  # 1. Main Application Gateway (Node.js)
  - type: web
    name: aegis-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: work.anuragkishan@gmail.com
      - key: EMAIL_FROM_NAME
        value: A.E.G.I.S Attendance
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Automatically link to the AI service
      - key: FACE_SERVICE_URL
        fromService:
          type: web
          name: aegis-ai
          property: url

  # 2. AI Face Verification Service (Python)
  - type: web
    name: aegis-ai
    runtime: python
    plan: free
    buildCommand: pip install -r face-service/requirements.txt
    startCommand: cd face-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
